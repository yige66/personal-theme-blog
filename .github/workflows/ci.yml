name: CI

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify Next.js blog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check server syntax
        run: node --check server.js

      - name: Run tests
        run: node --test

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Audit moderate severity vulnerabilities
        run: npm audit --audit-level=moderate --registry=https://registry.npmjs.org
